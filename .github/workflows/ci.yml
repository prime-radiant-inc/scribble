name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Build, test, and audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:all

      - name: Test
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build Docker image
        run: docker build -t scribble:ci .

      - name: Smoke Docker Linear MCP entrypoint
        run: |
          docker run --rm --entrypoint sh scribble:ci -c \
            'test -e /app/node_modules/.bin/streamlinear && node /app/node_modules/.bin/streamlinear </dev/null 2>&1 | grep -q "LINEAR_API_TOKEN environment variable is required"'
