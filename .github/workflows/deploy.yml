name: Deploy

on:
  workflow_run:
    workflows: ["Trigger Build"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Wait for Docker image build
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Waiting for sen-deploy build to complete..."
          # Get the most recent run triggered by this commit
          for i in {1..60}; do
            RUN_STATUS=$(gh run list --repo prime-radiant-inc/sen-deploy --limit 1 --json status,conclusion -q '.[0]')
            STATUS=$(echo "$RUN_STATUS" | jq -r '.status')
            CONCLUSION=$(echo "$RUN_STATUS" | jq -r '.conclusion')

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "Build succeeded!"
                break
              else
                echo "Build failed with conclusion: $CONCLUSION"
                exit 1
              fi
            fi

            echo "Build status: $STATUS (attempt $i/60)"
            sleep 10
          done

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Deploy to ECS
        run: |
          echo "Deploying to ECS..."
          aws ecs update-service --cluster sen-cluster --service scribble --force-new-deployment

          echo "Waiting for deployment to stabilize..."
          aws ecs wait services-stable --cluster sen-cluster --services scribble

          echo "Deployment complete!"
